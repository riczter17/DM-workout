<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Couples Workout</title>

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="theme-color" content="#0f1117">

<!-- App icon (inline SVG as data URI) -->
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjMGYxMTE3Ii8+PHRleHQgeD0iOTAiIHk9IjEwNSIgZm9udC1zaXplPSI4MCIgdGV4dC1hbmNob3I9Im1pZGRsZSI+8J+RqzwvdGV4dD48L3N2Zz4=">

<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2e3e;
    --accent: #e8a838;
    --accent-soft: rgba(232,168,56,0.12);
    --green: #34d399;
    --green-soft: rgba(52,211,153,0.12);
    --red: #f87171;
    --text: #e8e9ed;
    --text-muted: #8b8fa3;
    --text-dim: #5c6078;
    --white: #ffffff;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 32px;
  }

  /* Header */
  .header { text-align: center; padding: 28px 0 20px; }
  .header-icon { font-size: 40px; margin-bottom: 6px; }
  .header h1 { font-size: 24px; font-weight: 700; color: var(--white); letter-spacing: -0.5px; }
  .header p { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

  /* Buttons */
  .btn-primary {
    width: 100%; padding: 15px; background: var(--accent); color: #1a1d27;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: inherit;
  }
  .btn-primary:disabled { opacity: 0.4; }
  .btn-secondary {
    width: 100%; padding: 13px; background: transparent; color: var(--accent);
    border: 1.5px solid var(--accent); border-radius: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 10px; font-family: inherit;
  }
  .btn-past {
    width: 100%; padding: 11px; background: transparent; color: var(--text-muted);
    border: 1px dashed var(--border); border-radius: 12px; font-size: 14px;
    cursor: pointer; margin-top: 8px; font-family: inherit;
  }
  .btn-complete {
    width: 100%; padding: 15px; background: var(--green-soft); color: var(--green);
    border: 1.5px solid var(--green); border-radius: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 16px; font-family: inherit;
  }
  .btn-completed {
    width: 100%; padding: 15px; background: var(--green); color: #0f1117;
    border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 16px; font-family: inherit;
  }

  /* Date picker */
  .date-picker-card {
    margin-top: 8px; padding: 16px; background: var(--card);
    border-radius: 12px; border: 1px solid var(--accent);
  }
  .date-picker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .date-picker-header span { font-size: 14px; font-weight: 600; }
  .date-picker-header button { background: transparent; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px 8px; }
  .date-input {
    width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 16px; font-family: inherit;
    color-scheme: dark; outline: none;
  }
  .date-exists { margin-top: 8px; font-size: 12px; color: var(--accent); font-style: italic; }

  /* Section */
  .section { margin-top: 24px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

  /* Session cards */
  .session-card {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card); border-radius: 12px; padding: 13px 16px; margin-bottom: 8px;
    cursor: pointer; border: 1px solid var(--border);
  }
  .session-card:active { background: #22263a; }
  .session-card-left { display: flex; align-items: center; gap: 12px; }
  .week-badge {
    background: var(--accent-soft); color: var(--accent); padding: 6px 10px;
    border-radius: 8px; font-size: 13px; font-weight: 700; min-width: 36px; text-align: center;
  }
  .session-date { font-size: 14px; font-weight: 600; }
  .session-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .badge-complete { color: var(--green); font-size: 20px; font-weight: 700; }
  .badge-progress { color: var(--text-dim); font-size: 16px; }

  /* Legend */
  .legend { margin-top: 24px; background: var(--card); border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
  .legend h3 { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 13px; }
  .legend-label { font-weight: 600; min-width: 70px; }
  .legend-desc { color: var(--text-muted); }

  /* Nav bar */
  .nav-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 10px; position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .nav-bar .back { background: transparent; border: none; color: var(--accent); font-size: 15px; font-weight: 600; cursor: pointer; padding: 8px 0; font-family: inherit; }
  .nav-center { text-align: center; }
  .nav-week { display: block; font-size: 16px; font-weight: 700; color: var(--white); }
  .nav-date { display: block; font-size: 12px; color: var(--text-muted); }
  .nav-title { font-size: 16px; font-weight: 700; color: var(--white); }
  .nav-bar .del { background: transparent; border: none; font-size: 18px; cursor: pointer; padding: 8px; filter: grayscale(0.5); }

  /* Tabs */
  .tab-bar { display: flex; gap: 4px; background: var(--card); border-radius: 10px; padding: 4px; margin-bottom: 16px; border: 1px solid var(--border); }
  .tab {
    flex: 1; padding: 10px 0; background: transparent; border: none;
    color: var(--text-muted); font-size: 14px; font-weight: 600; border-radius: 8px;
    cursor: pointer; font-family: inherit;
  }
  .tab.active { background: var(--accent-soft); color: var(--accent); font-weight: 700; }

  /* Exercise cards */
  .ex-card { background: var(--card); border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); overflow: hidden; }
  .ex-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 16px; cursor: pointer;
  }
  .ex-header:active { background: #22263a; }
  .ex-header-left { display: flex; align-items: center; gap: 10px; }
  .ex-status { font-size: 18px; }
  .ex-name { font-size: 14px; font-weight: 600; }
  .ex-target { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .ex-peek { display: flex; align-items: center; gap: 6px; }
  .chevron { color: var(--text-dim); font-size: 11px; margin-left: 4px; }

  .ex-body { padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .last-week { font-size: 12px; color: var(--text-dim); padding: 8px 0 4px; border-bottom: 1px dashed var(--border); margin-bottom: 12px; }

  .person-block { margin-top: 12px; }
  .person-label { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .input-group { flex: 1; }
  .input-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-field {
    width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 16px; font-weight: 600;
    outline: none; font-family: inherit;
  }

  .score-row { display: flex; gap: 6px; }
  .score-btn {
    flex: 1; padding: 8px 4px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer; text-align: center; font-family: inherit;
  }
  .score-btn.selected { background: var(--accent-soft); border: 1.5px solid var(--accent); }
  .score-emoji { display: block; font-size: 16px; margin-bottom: 2px; }
  .score-label-text { display: block; font-size: 10px; color: var(--text-muted); font-weight: 600; }

  /* Walk */
  .walk-card { background: var(--card); border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
  .walk-title { font-size: 16px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
  .walk-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
  .walk-row { display: flex; gap: 12px; }
  .walk-group { flex: 1; }
  .walk-input {
    width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 16px; font-weight: 600;
    outline: none; font-family: inherit;
  }
  .walk-select {
    width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
    font-family: inherit; appearance: none;
  }
  .walk-tip {
    margin-top: 12px; padding: 12px 16px; background: var(--accent-soft);
    border-radius: 10px; font-size: 13px; color: var(--accent); line-height: 1.5;
  }
  textarea {
    width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; resize: vertical;
    outline: none; font-family: inherit; line-height: 1.5;
  }
  textarea.large { font-size: 14px; line-height: 1.6; margin-top: 8px; }

  /* Notes */
  .notes-card { background: var(--card); border-radius: 12px; padding: 16px; border: 1px solid var(--border); }

  /* Progress */
  .progress-card { background: var(--card); border-radius: 12px; padding: 16px; border: 1px solid var(--border); margin-bottom: 12px; }
  .progress-card h3 { font-size: 14px; font-weight: 700; color: var(--white); margin-bottom: 12px; }
  .progress-header {
    display: flex; padding: 0 0 8px; border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .progress-row { display: flex; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; align-items: center; }
  .col-wk { width: 36px; text-align: center; font-weight: 600; color: var(--text-dim); }
  .col { flex: 1; text-align: center; }

  /* Utility */
  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const EXERCISES = [
  { id: "squats", name: "Bodyweight Squats", targetReps: "10-12", hasWeight: false, unit: "reps" },
  { id: "pushups", name: "Incline Push-ups", targetReps: "8-10", hasWeight: false, unit: "reps" },
  { id: "bridges", name: "Glute Bridges", targetReps: "12-15", hasWeight: false, unit: "reps" },
  { id: "plank", name: "Plank Hold", targetReps: "20-30", hasWeight: false, unit: "sec" },
  { id: "rows", name: "DB Rows", targetReps: "10-12", hasWeight: true, unit: "reps" },
  { id: "holds", name: "Single-arm Holds", targetReps: "10-15", hasWeight: false, unit: "sec" },
];

const SCORES = {
  1: { label: "Easy", emoji: "\u{1F7E2}", desc: "Could do more" },
  2: { label: "Hard", emoji: "\u{1F7E1}", desc: "Completed but challenging" },
  3: { label: "Failed", emoji: "\u{1F534}", desc: "Didn't complete target" },
};

const STORAGE_KEY = "couples-workout-v1";

function loadSessions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveSessions(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

function newSession(dateStr) {
  const exercises = {};
  EXERCISES.forEach(ex => {
    exercises[ex.id] = {
      her: { r1: "", r2: "", weight: "", score: null },
      him: { r1: "", r2: "", weight: "", score: null },
    };
  });
  return { date: dateStr, exercises, walk: { duration: "15", pace: "", notes: "" }, notes: "", completed: false };
}

function formatDate(d) {
  return new Date(d + "T00:00:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric" });
}

function weekNum(sessions, dateStr) {
  const sorted = [...sessions].sort((a, b) => a.date.localeCompare(b.date));
  return sorted.findIndex(s => s.date === dateStr) + 1;
}

// State
let sessions = loadSessions();
let currentDate = null;
let currentView = "home";
let currentTab = "log";
let expandedEx = null;
let showDatePicker = false;
let customDate = "";

const $app = document.getElementById("app");

function render() {
  if (currentView === "home") renderHome();
  else if (currentView === "session") renderSession();
  else if (currentView === "progress") renderProgress();
}

function renderHome() {
  const sorted = [...sessions].sort((a, b) => b.date.localeCompare(a.date));
  let html = `
    <div class="header">
      <div class="header-icon">\u{1F46B}</div>
      <h1>Couples Workout</h1>
      <p>Saturday Programme Tracker</p>
    </div>
    <button class="btn-primary" onclick="createSession()">\u{FF0B} Start Today's Session</button>
  `;

  if (!showDatePicker) {
    html += `<button class="btn-past" onclick="toggleDatePicker()">\u{1F4C5} Log a Past Session</button>`;
  } else {
    const today = new Date().toISOString().split("T")[0];
    const exists = customDate && sessions.find(s => s.date === customDate);
    html += `
      <div class="date-picker-card">
        <div class="date-picker-header">
          <span>Select session date</span>
          <button onclick="toggleDatePicker()">\u{2715}</button>
        </div>
        <input type="date" class="date-input" value="${customDate}" max="${today}" onchange="customDate=this.value;render()">
        ${exists ? '<div class="date-exists">Session already exists for this date. Tapping below will open it.</div>' : ''}
        <button class="btn-primary mt-12" ${!customDate ? 'disabled' : ''} onclick="createSession('${customDate}')">
          ${exists ? 'Open Session' : 'Create Session'}
        </button>
      </div>
    `;
  }

  if (sorted.length > 0) {
    html += `<div class="section"><h2 class="section-title">Past Sessions</h2>`;
    sorted.forEach(s => {
      const wk = weekNum(sessions, s.date);
      const logged = Object.values(s.exercises).filter(e => e.her.score !== null).length;
      html += `
        <div class="session-card" onclick="openSession('${s.date}')">
          <div class="session-card-left">
            <div class="week-badge">W${wk}</div>
            <div>
              <div class="session-date">${formatDate(s.date)}</div>
              <div class="session-meta">${logged}/${EXERCISES.length} exercises logged${(s.walk.duration !== "15" || s.walk.notes) ? ' \u{00B7} Walk logged' : ''}</div>
            </div>
          </div>
          <div>${s.completed ? '<span class="badge-complete">\u{2713}</span>' : '<span class="badge-progress">\u{2022}\u{2022}\u{2022}</span>'}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  if (sessions.filter(s => s.completed).length >= 2) {
    html += `<button class="btn-secondary" onclick="currentView='progress';render()">\u{1F4CA} View Progress</button>`;
  }

  html += `
    <div class="legend">
      <h3>Session Score Guide</h3>
      ${[1,2,3].map(sc => `
        <div class="legend-row">
          <span>${SCORES[sc].emoji}</span>
          <span class="legend-label">${sc} = ${SCORES[sc].label}</span>
          <span class="legend-desc">${SCORES[sc].desc}</span>
        </div>
      `).join('')}
    </div>
  `;

  $app.innerHTML = html;
}

function renderSession() {
  const s = sessions.find(x => x.date === currentDate);
  if (!s) { currentView = "home"; render(); return; }
  const wk = weekNum(sessions, currentDate);

  let html = `
    <div class="nav-bar">
      <button class="back" onclick="currentView='home';expandedEx=null;render()">\u{2190} Back</button>
      <div class="nav-center">
        <span class="nav-week">Week ${wk}</span>
        <span class="nav-date">${formatDate(currentDate)}</span>
      </div>
      <button class="del" onclick="deleteSession('${currentDate}')">\u{1F5D1}</button>
    </div>
    <div class="tab-bar">
      <button class="tab ${currentTab === 'log' ? 'active' : ''}" onclick="currentTab='log';render()">Log</button>
      <button class="tab ${currentTab === 'walk' ? 'active' : ''}" onclick="currentTab='walk';render()">Walk</button>
      <button class="tab ${currentTab === 'notes' ? 'active' : ''}" onclick="currentTab='notes';render()">Notes</button>
    </div>
  `;

  if (currentTab === "log") {
    EXERCISES.forEach(ex => {
      const d = s.exercises[ex.id];
      const isOpen = expandedEx === ex.id;
      const herDone = d.her.score !== null;
      const himDone = d.him.score !== null;
      const status = herDone && himDone ? "\u{2705}" : (herDone || himDone ? "\u{1F536}" : "\u{2B1C}");

      // Last week hint
      const completed = [...sessions].filter(x => x.completed && x.date !== currentDate).sort((a,b) => b.date.localeCompare(a.date));
      const lastWeek = completed.length > 0 ? completed[0] : null;
      let hint = "";
      if (lastWeek) {
        const ld = lastWeek.exercises[ex.id];
        hint = `Last week \u{2014} Her: ${ld.her.score ? SCORES[ld.her.score].emoji : '\u{2014}'} Him: ${ld.him.score ? SCORES[ld.him.score].emoji : '\u{2014}'}${ex.hasWeight && ld.her.weight ? ' \u{00B7} ' + ld.her.weight + 'kg' : ''}`;
      }

      html += `<div class="ex-card">
        <div class="ex-header" onclick="expandedEx=expandedEx==='${ex.id}'?null:'${ex.id}';render()">
          <div class="ex-header-left">
            <span class="ex-status">${status}</span>
            <div>
              <div class="ex-name">${ex.name}</div>
              <div class="ex-target">2 \u{00D7} ${ex.targetReps} ${ex.unit}${ex.hasWeight ? ' (each arm)' : ''}</div>
            </div>
          </div>
          <div class="ex-peek">
            ${herDone ? SCORES[d.her.score].emoji : ''}
            ${himDone ? SCORES[d.him.score].emoji : ''}
            <span class="chevron">${isOpen ? '\u{25B2}' : '\u{25BC}'}</span>
          </div>
        </div>`;

      if (isOpen) {
        html += `<div class="ex-body">`;
        if (hint) html += `<div class="last-week">${hint}</div>`;

        ["her", "him"].forEach(person => {
          const pd = d[person];
          html += `
            <div class="person-block">
              <div class="person-label">${person === "her" ? "\u{1F469} Her" : "\u{1F468} Him"}</div>
              <div class="input-row">
                <div class="input-group">
                  <label class="input-label">R1</label>
                  <input type="number" inputmode="numeric" class="input-field" value="${pd.r1}" placeholder="${ex.targetReps.split('-')[0]}"
                    onchange="updateEx('${ex.id}','${person}','r1',this.value)">
                </div>
                <div class="input-group">
                  <label class="input-label">R2</label>
                  <input type="number" inputmode="numeric" class="input-field" value="${pd.r2}" placeholder="${ex.targetReps.split('-')[0]}"
                    onchange="updateEx('${ex.id}','${person}','r2',this.value)">
                </div>
                ${ex.hasWeight ? `
                <div class="input-group">
                  <label class="input-label">kg</label>
                  <input type="number" inputmode="decimal" class="input-field" value="${pd.weight}" placeholder="5"
                    onchange="updateEx('${ex.id}','${person}','weight',this.value)">
                </div>` : ''}
              </div>
              <div class="score-row">
                ${[1,2,3].map(sc => `
                  <button class="score-btn ${pd.score === sc ? 'selected' : ''}" onclick="updateEx('${ex.id}','${person}','score',${sc})">
                    <span class="score-emoji">${SCORES[sc].emoji}</span>
                    <span class="score-label-text">${SCORES[sc].label}</span>
                  </button>
                `).join('')}
              </div>
            </div>
          `;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
  }

  if (currentTab === "walk") {
    html += `
      <div class="walk-card">
        <div class="walk-title">\u{1F6B6} Zone 1-2 Cardio Walk</div>
        <p class="walk-desc">Conversational pace, brisk but can talk easily</p>
        <div class="walk-row">
          <div class="walk-group">
            <label class="input-label">Duration (min)</label>
            <input type="number" inputmode="numeric" class="walk-input" value="${s.walk.duration}" onchange="updateWalk('duration',this.value)">
          </div>
          <div class="walk-group">
            <label class="input-label">Pace feel</label>
            <select class="walk-select" onchange="updateWalk('pace',this.value)">
              <option value="" ${!s.walk.pace ? 'selected' : ''}>Select...</option>
              <option value="too_easy" ${s.walk.pace === 'too_easy' ? 'selected' : ''}>Too easy (zone 1)</option>
              <option value="just_right" ${s.walk.pace === 'just_right' ? 'selected' : ''}>Just right (zone 1-2)</option>
              <option value="slightly_hard" ${s.walk.pace === 'slightly_hard' ? 'selected' : ''}>Slightly hard (zone 2)</option>
              <option value="too_hard" ${s.walk.pace === 'too_hard' ? 'selected' : ''}>Too hard (zone 3+)</option>
            </select>
          </div>
        </div>
        <div class="mt-16">
          <label class="input-label">Walk notes</label>
          <textarea rows="3" placeholder="Route, weather, how she felt, conversation highlights..." onchange="updateWalk('notes',this.value)">${s.walk.notes}</textarea>
        </div>
      </div>
      <div class="walk-tip"><strong>Reminder:</strong> ~2,000 steps from a 15-min brisk walk. This counts towards your 8k daily target.</div>
    `;
  }

  if (currentTab === "notes") {
    html += `
      <div class="notes-card">
        <div class="walk-title">\u{1F4DD} Session Notes</div>
        <textarea class="large" rows="6" placeholder="Progression observations, form corrections, how she's feeling about the programme, what to adjust next week..." onchange="updateNotes(this.value)">${s.notes}</textarea>
      </div>
      <button class="${s.completed ? 'btn-completed' : 'btn-complete'}" onclick="toggleComplete()">
        ${s.completed ? '\u{2713} Session Complete \u{2014} Tap to Reopen' : 'Mark Session Complete'}
      </button>
    `;
  }

  $app.innerHTML = html;
}

function renderProgress() {
  const completed = [...sessions].filter(s => s.completed).sort((a, b) => a.date.localeCompare(b.date));

  let html = `
    <div class="nav-bar">
      <button class="back" onclick="currentView='home';render()">\u{2190} Back</button>
      <span class="nav-title">Progress Overview</span>
      <span></span>
    </div>
  `;

  EXERCISES.forEach(ex => {
    html += `
      <div class="progress-card">
        <h3>${ex.name}</h3>
        <div class="progress-header">
          <span class="col-wk">Wk</span>
          <span class="col">Her</span>
          <span class="col">Him</span>
          ${ex.hasWeight ? '<span class="col">Wt</span>' : ''}
        </div>
        ${completed.map((s, i) => {
          const d = s.exercises[ex.id];
          return `<div class="progress-row">
            <span class="col-wk">${i + 1}</span>
            <span class="col">${d.her.score ? SCORES[d.her.score].emoji : '\u{2014}'}</span>
            <span class="col">${d.him.score ? SCORES[d.him.score].emoji : '\u{2014}'}</span>
            ${ex.hasWeight ? `<span class="col">${d.her.weight || '\u{2014}'}kg</span>` : ''}
          </div>`;
        }).join('')}
      </div>
    `;
  });

  html += `
    <div class="progress-card">
      <h3>Couples Walk</h3>
      <div class="progress-header">
        <span class="col-wk">Wk</span>
        <span class="col" style="flex:2">Dur</span>
        <span class="col" style="flex:3;text-align:left">Notes</span>
      </div>
      ${completed.map((s, i) => `
        <div class="progress-row">
          <span class="col-wk">${i + 1}</span>
          <span class="col" style="flex:2">${s.walk.duration}min</span>
          <span class="col" style="flex:3;text-align:left;font-size:12px">${s.walk.notes || '\u{2014}'}</span>
        </div>
      `).join('')}
    </div>
  `;

  $app.innerHTML = html;
}

// Actions
function createSession(dateStr) {
  const target = dateStr || new Date().toISOString().split("T")[0];
  const exists = sessions.find(s => s.date === target);
  if (exists) { currentDate = target; currentView = "session"; currentTab = "log"; showDatePicker = false; customDate = ""; render(); return; }
  sessions.push(newSession(target));
  saveSessions(sessions);
  currentDate = target; currentView = "session"; currentTab = "log"; showDatePicker = false; customDate = ""; render();
}

function openSession(dateStr) { currentDate = dateStr; currentView = "session"; currentTab = "log"; expandedEx = null; render(); }

function toggleDatePicker() { showDatePicker = !showDatePicker; customDate = ""; render(); }

function deleteSession(dateStr) {
  if (!confirm("Delete this session permanently?")) return;
  sessions = sessions.filter(s => s.date !== dateStr);
  saveSessions(sessions);
  currentView = "home"; currentDate = null; render();
}

function updateEx(exId, person, field, value) {
  const s = sessions.find(x => x.date === currentDate);
  if (!s) return;
  if (field === "score") value = parseInt(value);
  s.exercises[exId][person][field] = value;
  saveSessions(sessions);
  render();
}

function updateWalk(field, value) {
  const s = sessions.find(x => x.date === currentDate);
  if (!s) return;
  s.walk[field] = value;
  saveSessions(sessions);
  render();
}

function updateNotes(value) {
  const s = sessions.find(x => x.date === currentDate);
  if (!s) return;
  s.notes = value;
  saveSessions(sessions);
  render();
}

function toggleComplete() {
  const s = sessions.find(x => x.date === currentDate);
  if (!s) return;
  s.completed = !s.completed;
  saveSessions(sessions);
  render();
}

// Initial render
render();
</script>
</body>
</html>
